<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World</title>
    <style>
      :root {
        --bg-start: #1e1b4b;
        --bg-end: #0f172a;
        --accent: #a78bfa;
        --accent-soft: #c4b5fd;
        --text: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: radial-gradient(
          circle at top left,
          var(--bg-start),
          var(--bg-end) 70%
        );
        color: var(--text);
        overflow: hidden;
        position: relative;
      }

      /* Soft floating orbs for visual depth */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.35;
        animation: float 8s ease-in-out infinite;
      }

      .orb.one {
        width: 300px;
        height: 300px;
        background: #7c3aed;
        top: -80px;
        left: -80px;
      }

      .orb.two {
        width: 260px;
        height: 260px;
        background: #06b6d4;
        bottom: -60px;
        right: -60px;
        animation-delay: 2s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) translateX(0);
        }
        50% {
          transform: translateY(20px) translateX(15px);
        }
      }

      .card {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 3.5rem 4.5rem;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 24px;
        backdrop-filter: blur(14px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        animation: rise 0.8s ease-out;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2.5rem, 6vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(90deg, var(--text), var(--accent-soft));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        color: #cbd5e1;
        letter-spacing: 0.02em;
      }

      .dot {
        color: var(--accent);
      }

      @media (max-width: 480px) {
        .card {
          padding: 2.5rem 2rem;
          margin: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <div class="card">
      <h1>Hello, World<span class="dot">.</span></h1>
      <p>A small page, nicely dressed up.</p>
    </div>
  </body>
</html>
